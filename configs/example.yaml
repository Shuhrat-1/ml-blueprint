run:
  name: "example"
  engine: "sklearn"
  task: "classification"
  seed: 42
  deterministic_torch: false

data:
  path: "data/sample.csv"
  format: "csv"
  target: "target"
  id_cols: ["id"]
  datetime_cols: []
  numeric_cols: ["age", "income"]
  categorical_cols: ["city"]

split:
  method: "random"
  test_size: 0.2
  val_size: 0.0
  stratify: true
  random_state: 42
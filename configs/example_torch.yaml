run:
  name: "example_torch"
  engine: "torch"
  task: "classification"
  seed: 42
  deterministic_torch: false

data:
  path: "data/sample.csv"
  format: "csv"
  target: "target"
  id_cols: ["id"]
  datetime_cols: []
  numeric_cols: ["age", "income"]
  categorical_cols: ["city"]

split:
  method: "random"
  test_size: 0.2
  val_size: 0.2
  stratify: false
  random_state: 42

model:
  name: "gb"
  params: {}

torch:
  batch_size: 16
  max_epochs: 50
  lr: 0.01
  weight_decay: 0.0
  hidden_dims: [64, 32]
  dropout: 0.1
  early_stopping: true
  patience: 5
  min_delta: 0.0
  scheduler: "plateau"
  step_size: 10
  gamma: 0.5